# All knobs for the chest-xray multi-modal system.
# Source of truth for paths, model IDs, sample sizes, and retrieval params.

# ---------- Data ----------
data:
  kaggle_slug: "simhadrisadaram/mimic-cxr-dataset"
  sample_dir: "data/sample"
  images_dir: "data/sample/images"
  manifest_all: "data/sample/manifest.csv"
  manifest_index: "data/sample/manifest_index.csv"   # 300 rows for indexing
  manifest_test: "data/sample/manifest_test.csv"     # 100 rows held out
  qa_dataset: "data/sample/qa_dataset.json"
  total_samples: 400
  index_split: 300
  test_split: 100
  seed: 42

# ---------- Models ----------
models:
  medgemma:
    hf_id: "google/medgemma-1.5-4b-it"
    load_in_4bit: true
    max_new_tokens: 512
    # Sampling temperature. 0.0 = greedy (modal output collapses to "no acute
    # cardiopulmonary process" boilerplate). 0.3-0.5 gives varied + grounded
    # outputs. Set to 0 if reproducibility matters more than diversity.
    temperature: 0.3
  colpali:
    # -merged variant: same v1.3 trained weights but LoRA pre-merged into the
    # base model. No PEFT adapter loading -> no LoRA-key remap problems on
    # transformers 4.52+. Plain from_pretrained loads cleanly.
    hf_id: "vidore/colpali-v1.3-merged"
    index_path: "data/sample/colpali_index"
    report_image_size: [1024, 1280]   # width, height for rendered report PNGs
    # 4-bit: bf16 (5.4 GB) does NOT fit alongside MedGemma 4-bit + KV cache
    # on a T4 (~8.6 GB resident after one generate call). 4-bit ColPali is ~2 GB.
    # The earlier FP4-init bug was specific to colpali-v1.3-hf + transformers
    # native loading; via colpali-engine-from-source + v1.3 adapter checkpoint
    # the 4-bit path works correctly.
    load_in_4bit: true
  clip:
    # BiomedCLIP: ViT-base/16 image encoder + PubMedBERT text encoder, pretrained
    # on 15M PubMed (image, caption) pairs by Microsoft. Same open_clip API,
    # same 512-d embedding output, but actually understands radiology features
    # (sternotomy hardware, cardiomegaly, edema patterns) that vanilla OpenCLIP
    # cannot see. The "hf-hub:" prefix tells open_clip to load via HF Hub.
    model_name: "hf-hub:microsoft/BiomedCLIP-PubMedBERT_256-vit_base_patch16_224"
    pretrained: null    # not used for hf-hub models
    index_path: "data/sample/clip_index.faiss"
    # ViT-B/16 has 4x more patches than ViT-B/32 -> smaller batch to stay safe on T4.
    embed_batch_size: 16
  text_retriever:
    hf_id: "sentence-transformers/all-MiniLM-L6-v2"
    index_path: "data/sample/text_index.faiss"

# ---------- Retrieval ----------
retrieval:
  top_k: 3

# ---------- QA dataset generation ----------
qa_generation:
  reports_to_use: 25         # 25 * 3 pairs = 75 QA items; covers eval.qa_test_n=50 + buffer
  pairs_per_report: 3

# ---------- Evaluation ----------
eval:
  # Sized so a full `python -m src.eval` lands in ~20 min on a Colab T4:
  # 30 report imgs * ~9 s + 15 questions * ~30 s + 30 judge * ~3 s + overhead.
  # Override via --limit-report / --limit-qa CLI flags when needed.
  report_test_n: 30
  qa_test_n: 15
  bertscore_lang: "en"
  results_dir: "results"
  comparison_json: "results/comparison.json"
  comparison_md: "results/comparison.md"

# ---------- Demo ----------
demo:
  share: true
  server_name: "0.0.0.0"
  server_port: 7860
